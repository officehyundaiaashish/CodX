            box-shadow: none;
            z-index: 200;
            max-height: 200px;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(-6px) scale(0.97);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .gh-custom-list::-webkit-scrollbar {
            display: none;
        }

        .gh-custom-list.open {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .gh-custom-option {
            padding: 11px 14px;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--glass-border);
        }

        .gh-custom-option:last-child {
            border-bottom: none;
        }

        .gh-custom-option:active,
        .gh-custom-option.selected {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .gh-custom-option .material-icons-round {
            font-size: 15px;
            opacity: 0.6;
        }


        /* ===== AGENT MODAL ===== */
        #agent-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #agent-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        #agent-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.88);
            width: 88%;
            max-width: 380px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 0;
            z-index: 210;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.22s ease, transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1), visibility 0.22s ease;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        #agent-modal.active {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Modal header strip */
        #agent-modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px 18px 14px;
            border-bottom: 1px solid var(--glass-border);
        }

        #agent-modal-avatar {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #agent-modal-avatar .material-icons-round {
            font-size: 18px;
            color: white;
        }

        /* Scrollable body */
        #agent-modal-body {
            padding: 16px 18px;
            overflow-y: auto;
            max-height: 72vh;
        }

        #agent-modal-body::-webkit-scrollbar {
            display: none;
        }

        /* Connected agent pill */
        .am-agent-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1.5px solid var(--glass-border);
            background: transparent;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s, transform 0.12s;
            margin-bottom: 6px;
        }

        .am-agent-row.active {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .am-agent-row:active {
            transform: scale(0.98);
        }

        .am-agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .am-agent-row.active .am-agent-dot {
            background: #10b981;
        }

        .am-agent-name {
            flex: 1;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .am-agent-del {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            opacity: 0.3;
            color: var(--text-color);
            border-radius: 6px;
            transition: opacity 0.15s, color 0.15s;
            display: flex;
            align-items: center;
        }

        .am-agent-del:active {
            opacity: 1;
            color: #ef4444;
        }

        .am-agent-del .material-icons-round {
            font-size: 15px;
            pointer-events: none;
        }

        /* Key input */
        #agent-api-key {
            width: 100%;
            padding: 11px 13px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.18);
            border: 1.5px solid var(--glass-border);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            margin-bottom: 8px;
            user-select: text;
            -webkit-user-select: text;
            transition: border-color 0.18s, box-shadow 0.18s;
            outline: none;
        }

        #agent-api-key:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        /* Provider quick-links */
        .am-provider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.1);
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s;
            margin-bottom: 5px;
        }

        .am-provider-row:active {
            background: var(--accent-dim);
            border-color: var(--accent);
        }

        .am-provider-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .am-provider-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-color);
        }

        .am-provider-tag {
            font-size: 9px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 5px;
            margin-left: 5px;
        }

        .agent-provider-grid {
            display: none;
        }

        .agent-provider-btn {
            display: none;
        }

        /* Animated provider selection list */
        #agent-model-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
            opacity: 0;
        }

        #agent-model-list.open {
            max-height: 280px;
            opacity: 1;
        }

        #agent-model-list-inner {
            max-height: 260px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 4px 0 6px;
        }

        #agent-model-list-inner::-webkit-scrollbar {
            display: none;
        }

        .am-model-row {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1.5px solid var(--glass-border);
            background: transparent;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, transform 0.12s;
            animation: amRowIn 0.2s ease both;
        }

        @keyframes amRowIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .am-model-row:active {
            transform: scale(0.97);
        }

        .am-model-row:hover,
        .am-model-row.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .am-model-dot {
            width: 15px;
            height: 15px;
            border-radius: 4px;
            border: 1.5px solid var(--glass-border);
            background: transparent;
            flex-shrink: 0;
            transition: background 0.15s, border-color 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .am-model-row.selected .am-model-dot {
            background: var(--accent);
            border-color: var(--accent);
        }

        .am-model-dot::after {
            content: '';
            display: none;
            width: 4px;
            height: 7px;
            border: 2px solid white;
            border-top: none;
            border-left: none;
            transform: rotate(45deg) translate(0px, -1px);
        }

        .am-model-row.selected .am-model-dot::after {
            display: block;
        }

        .am-model-name {
            flex: 1;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: 'Poppins', sans-serif;
        }

        .am-model-tag {
            font-size: 8px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 5px;
            flex-shrink: 0;
            font-family: 'Poppins', sans-serif;
        }


        /* ===== AGENT BAR — compact strip inside nav panel ===== */
        #agent-bar {
            display: none;
            flex-direction: column;
            gap: 0;
            border-bottom: 1px solid var(--glass-border);
            background: var(--glass-bg);
        }

        #agent-bar.visible {
            display: flex;
        }

        #agent-compact-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
        }

        .agent-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #6b7280;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        #agent-prompt {
            flex: 1;
            padding: 7px 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            resize: none;
            height: 34px;
            max-height: 90px;
            overflow-y: auto;
            line-height: 1.4;
            user-select: text;
            -webkit-user-select: text;
            transition: border-color 0.2s;
        }

        #agent-prompt:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        #agent-attach-btn,
        #agent-send-btn {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: none;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        #agent-attach-btn:active,
        #agent-send-btn:active {
            transform: scale(0.9);
        }

        #agent-attach-btn {
            background: rgba(128, 128, 128, 0.12);
            color: var(--text-color);
        }

        #agent-send-btn {
            background: var(--accent);
            color: white;
        }

        #agent-send-btn .material-icons-round,
        #agent-attach-btn .material-icons-round {
            font-size: 16px;
            pointer-events: none;
        }

        #agent-bar-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            white-space: nowrap;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #agent-close-btn {
            font-size: 16px;
            opacity: 0.4;
            cursor: pointer;
            pointer-events: auto;
            flex-shrink: 0;
        }

        #agent-thinking {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--accent);
            font-weight: 600;
            padding: 0 10px 5px;
        }

        #agent-thinking.visible {
            display: flex;
        }

        .agent-dots span {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            margin-right: 2px;
            animation: agentBounce 0.8s infinite;
        }

        .agent-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .agent-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes agentBounce {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            40% {
                transform: translateY(-4px);
                opacity: 1;
            }
        }

        @keyframes activityFadeIn {
            from {
                opacity: 0;
                transform: translateY(3px);
            }

            to {
                opacity: 0.7;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes commitSpin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        #agent-file-selector {
            padding: 0 10px 5px;
        }

        #agent-file-select {
            width: 100%;
            padding: 5px 8px;
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: Poppins, sans-serif;
            font-size: 10px;
            font-weight: 600;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }


        /* Full-screen chat overlay */
        #agent-chat-overlay {
            position: fixed;
            inset: 0;
            z-index: 400;
            background: rgba(0, 0, 0, 0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        #agent-chat-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Chat panel — slides up like WhatsApp */
        #agent-chat-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 88vh;
            max-height: 88vh;
            background: var(--glass-bg);
            border-radius: 22px 22px 0 0;
            border-top: 1px solid var(--glass-border);
            z-index: 410;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.34, 1.2, 0.64, 1);
            font-family: 'Poppins', sans-serif;
        }

        #agent-chat-panel.active {
            transform: translateY(0);
        }

        /* Chat header bar */
        #agent-chat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .chat-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .chat-header-avatar .material-icons-round {
            font-size: 18px;
            color: white;
        }

        .chat-header-info {
            flex: 1;
            min-width: 0;
        }

        .chat-header-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header-status {
            font-size: 10px;
            color: var(--accent);
            font-weight: 600;
            margin-top: 1px;
        }

        #chat-session-name-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.4;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
            transition: opacity 0.15s;
        }

        #chat-session-name-btn:active {
            opacity: 1;
        }

        #chat-session-name-btn .material-icons-round {
            font-size: 17px;
            pointer-events: none;
        }

        #chat-close-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.45;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
        }

        #chat-close-btn .material-icons-round {
            font-size: 20px;
            pointer-events: none;
        }

        /* Session name pill */
        #chat-session-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            border-radius: 20px;
            padding: 2px 9px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
            cursor: pointer;
        }

        /* Messages scroll area */
        #agent-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #agent-chat-messages::-webkit-scrollbar {
            display: none;
        }

        /* Individual message bubbles */
        .chat-msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            min-width: 0;
        }

        .chat-msg.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .chat-msg.agent {
            align-self: flex-start;
            align-items: flex-start;
            width: 100%;
            max-width: 100%;
        }

        .chat-bubble {
            padding: 9px 13px;
            border-radius: 16px;
            font-size: 12px;
            line-height: 1.55;
            word-break: break-word;
            min-width: 0;
            overflow: hidden;
            max-width: 100%;
            box-sizing: border-box;
        }

        .chat-msg.user .chat-bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-msg.agent .chat-bubble {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
        }

        body.light-theme .chat-msg.agent .chat-bubble {
            background: rgba(0, 0, 0, 0.04);
        }

        .chat-time {
            font-size: 9px;
            opacity: 0.4;
            margin-top: 3px;
            font-weight: 600;
        }

        .chat-msg-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 3px;
        }

        .chat-copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0;
            padding: 2px 5px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 9px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: opacity 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .chat-copy-btn .material-icons-round {
            font-size: 12px;
            pointer-events: none;
        }

        .chat-msg:hover .chat-copy-btn,
        .chat-msg:active .chat-copy-btn {
            opacity: 0.6;
        }

        .chat-copy-btn:active {
            opacity: 1 !important;
            background: var(--accent-dim);
            color: var(--accent);
        }

        .chat-copy-btn.copied {
            opacity: 1 !important;
            color: var(--accent);
        }

        /* ── Code Canvas (Gemini-style) ── */
        .code-canvas {
            margin: 8px 0 4px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            background: #0d0d10;
            font-family: 'Courier New', Courier, monospace;
            max-width: 100%;
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
        }

        body.light-theme .code-canvas {
            background: #1e1e2e;
        }

        .code-canvas-header {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .code-canvas-lang {
            font-size: 9px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .code-canvas-btn {
            background: rgba(255, 255, 255, 0.07);
            border: none;
            border-radius: 6px;
            padding: 3px 7px;
            font-size: 9px;
            font-weight: 700;
            font-family: 'Poppins', sans-serif;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 3px;
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .code-canvas-btn:active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .code-canvas-btn .material-icons-round {
            font-size: 11px;
            pointer-events: none;
        }

        .code-canvas-btn.copied {
            color: var(--accent);
        }

        .code-canvas-body {
            padding: 10px 12px;
            overflow-x: auto;
            overflow-y: auto;
            font-size: 11px;
            line-height: 1.55;
            color: #e0e0e0;
            white-space: pre;
            max-height: 260px;
            -webkit-overflow-scrolling: touch;
        }

        /* inline code */
        .chat-inline-code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent);
            padding: 1px 5px;
            border-radius: 4px;
        }

        /* chat markdown */
        .chat-md-bold {
            font-weight: 700;
        }

        .chat-md-li {
            padding-left: 14px;
            position: relative;
        }

        .chat-md-li::before {
            content: '•';
            position: absolute;
            left: 3px;
            color: var(--accent);
        }

        .agent-step-card {
            margin-top: 8px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
        }

        .agent-step-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            background: rgba(16, 185, 129, 0.08);
            border-bottom: 1px solid var(--glass-border);
        }

        .agent-step-num {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .agent-step-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
        }

        .agent-step-body {
            padding: 10px 12px;
            font-size: 12px;
            line-height: 1.6;
            color: var(--text-color);
            opacity: 0.9;
            background: rgba(0, 0, 0, 0.12);
        }

        .agent-step-actions {
            display: flex;
            gap: 8px;
            padding: 9px 12px;
            background: rgba(0, 0, 0, 0.10);
            border-top: 1px solid var(--glass-border);
        }

        .agent-step-accept {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: opacity 0.15s, transform 0.15s;
        }

        .agent-step-accept:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        .agent-step-accept .material-icons-round {
            font-size: 14px;
            pointer-events: none;
        }

        .agent-step-reject {
            padding: 8px 14px;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: none;
            color: var(--text-color);
            opacity: 0.6;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, background 0.15s;
        }

        .agent-step-reject:active {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            opacity: 1;
        }

        .agent-step-refine-btn {
            padding: 8px 12px;
            border: 1px solid var(--accent);
            border-radius: 8px;
            background: none;
            color: var(--accent);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        .agent-step-refine-btn:active {
            background: var(--accent-dim);
        }

        .agent-step-refine-area {
            padding: 8px 12px;
            border-top: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .agent-step-refine-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            padding: 7px 10px;
            resize: none;
            outline: none;
            line-height: 1.4;
            min-height: 34px;
            max-height: 80px;
        }

        .agent-step-refine-input:focus {
            border-color: var(--accent);
        }

        .agent-step-refine-send {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: none;
            flex-shrink: 0;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.15s, transform 0.15s;
        }

        .agent-step-refine-send:active {
            opacity: 0.8;
            transform: scale(0.9);
        }

        .agent-step-refine-send .material-icons-round {
            font-size: 16px;
            pointer-events: none;
        }

        .agent-step-done {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-color);
            opacity: 0.4;
            padding: 9px 12px;
            background: rgba(0, 0, 0, 0.10);
            border-top: 1px solid var(--glass-border);
            text-align: center;
        }

        .agent-plan-item {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            padding: 6px 0;
            border-bottom: 1px solid var(--glass-border);
            font-size: 11px;
            line-height: 1.5;
        }

        .agent-plan-item:last-child {
            border-bottom: none;
        }

        .agent-plan-num {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            min-width: 18px;
            margin-top: 1px;
        }

        /* Typing indicator bubble */
        .chat-typing-bubble {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 10px 14px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            width: fit-content;
        }

        .chat-typing-bubble span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            animation: agentBounce 0.8s infinite;
        }

        .chat-typing-bubble span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .chat-typing-bubble span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Fix / Apply card inside chat bubble */
        .chat-fix-card {
            margin-top: 8px;
            background: rgba(16, 185, 129, 0.07);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 10px;
            padding: 9px 11px;
        }

        .chat-fix-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .chat-fix-reason {
            font-size: 11px;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .chat-fix-preview {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }

        .chat-fix-side {
            flex: 1;
            border-radius: 6px;
            padding: 5px 7px;
            min-width: 0;
        }

        .chat-fix-side.remove {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .chat-fix-side.insert {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .chat-fix-side-label {
            font-size: 8px;
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 3px;
        }

        .chat-fix-side.remove .chat-fix-side-label {
            color: #ef4444;
        }

        .chat-fix-side.insert .chat-fix-side-label {
            color: #10b981;
        }

        .chat-fix-code {
            font-family: monospace;
            font-size: 10px;
            word-break: break-all;
            opacity: 0.9;
        }

        .chat-fix-side.remove .chat-fix-code {
            color: #ef4444;
        }

        .chat-fix-side.insert .chat-fix-code {
            color: #10b981;
        }

        .chat-apply-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.15s, transform 0.15s;
        }

        .chat-apply-btn:active {
            opacity: 0.85;
            transform: scale(0.97);
        }

        .chat-apply-btn.applied {
            background: rgba(128, 128, 128, 0.2);
            color: var(--text-color);
            cursor: default;
        }

        .chat-apply-btn .material-icons-round {
            font-size: 15px;
            pointer-events: none;
        }

        /* Split file card */
        .chat-split-card {
            margin-top: 8px;
            background: rgba(16, 185, 129, 0.06);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 10px;
            padding: 9px 11px;
        }

        .chat-split-file-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-split-file-row:last-of-type {
            border-bottom: none;
        }

        .chat-split-file-name {
            flex: 1;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-split-mini-btn {
            background: var(--accent-dim);
            border: none;
            border-radius: 6px;
            padding: 4px 7px;
            cursor: pointer;
            font-size: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            color: var(--accent);
            transition: transform 0.15s;
        }

        .chat-split-mini-btn:active {
            transform: scale(0.92);
        }

        /* Chat input row */
        #agent-chat-input-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 14px;
            padding-bottom: max(env(safe-area-inset-bottom), 14px);
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        #agent-chat-file-selector {
            padding: 0 14px 6px;
            display: none;
            flex-shrink: 0;
        }

        #agent-chat-file-select {
            width: 100%;
            padding: 5px 8px;
            border-radius: 7px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: Poppins, sans-serif;
            font-size: 10px;
            font-weight: 600;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        #agent-chat-textarea {
            flex: 1;
            padding: 9px 12px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            resize: none;
            min-height: 38px;
            max-height: 100px;
            overflow-y: auto;
            line-height: 1.4;
            user-select: text;
            -webkit-user-select: text;
            transition: border-color 0.2s;
        }

        #agent-chat-textarea:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        #agent-chat-attach-btn,
        #agent-chat-send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s, opacity 0.15s;
        }

        #agent-chat-attach-btn:active,
        #agent-chat-send-btn:active {
            transform: scale(0.88);
        }

        #agent-chat-attach-btn {
            background: rgba(128, 128, 128, 0.12);
            color: var(--text-color);
        }

        #agent-chat-send-btn {
            background: var(--accent);
            color: white;
        }

        #agent-chat-attach-btn .material-icons-round,
        #agent-chat-send-btn .material-icons-round {
            font-size: 17px;
            pointer-events: none;
        }

        /* Empty chat state */
        #chat-empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            opacity: 0.45;
            pointer-events: none;
            padding: 20px;
        }

        #chat-empty-state .material-icons-round {
            font-size: 38px;
            color: var(--accent);
        }

        #chat-empty-state p {
            font-size: 12px;
            text-align: center;
            line-height: 1.6;
            color: var(--text-color);
        }



        /* When chat is open, main-container splits into two halves */
        .main-container.chat-split {
            display: flex;
            flex-direction: column;
        }

        /* Editor half — top 50% */
        .main-container.chat-split #editor {
            position: relative;
            top: auto;
            right: auto;
            bottom: auto;
            left: auto;
            flex: 1;
            min-height: 0;
            border-bottom: 2px solid var(--accent);
        }

        /* Chat half — bottom 50% */
        #inline-chat-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 41;
            height: 45vh;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            border-top: 2px solid var(--accent);
            border-radius: var(--panel-round) var(--panel-round) 0 0;
            box-shadow: 0 -3px 16px rgba(0, 0, 0, 0.10);
            overflow: hidden;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            will-change: transform;
        }

        #inline-chat-panel.chat-open {
            transform: translateY(0);
            pointer-events: auto;
        }

        /* Chat header — compact strip */
        #inline-chat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .inline-chat-avatar {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .inline-chat-avatar .material-icons-round {
            font-size: 14px;
            color: white;
        }

        #inline-chat-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-color);
            flex: 1;
        }

        #inline-chat-status {
            font-size: 10px;
            color: var(--accent);
            font-weight: 600;
        }

        #inline-chat-close {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.4;
            display: flex;
            align-items: center;
            padding: 2px;
        }

        #inline-chat-close .material-icons-round {
            font-size: 18px;
            pointer-events: none;
        }

        /* Fullscreen toggle */
        #inline-chat-fullscreen {
            background: rgba(128, 128, 128, 0.1);
            border: none;
            border-radius: 8px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.55;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }

        #inline-chat-fullscreen:active {
            opacity: 1;
            background: var(--accent-dim);
        }

        #inline-chat-panel.chat-fullscreen {
            top: var(--header-full-h, 80px) !important;
            height: calc(100svh - var(--header-full-h, 80px)) !important;
            border-radius: 0 !important;
            padding-top: 0;
            max-height: calc(100svh - var(--header-full-h, 80px)) !important;
        }

        /* Chat mode button — animated glow ring when ON */
        #inline-chat-mode-btn {
            position: relative;
            transition: background 0.25s, color 0.25s, box-shadow 0.25s;
        }

        #inline-chat-mode-btn.mode-on {
            background: var(--accent) !important;
            color: white !important;
            animation: chatModePulse 2s ease-out infinite;
        }

        @keyframes chatModePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6);
            }

            60% {
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        #inline-chat-mode-btn.mode-on svg {
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.4));
        }

        #chat-code-access-btn {
            display: none;
            position: relative;
            transition: background 0.25s, color 0.25s, box-shadow 0.25s;
        }

        #chat-code-access-btn.access-on {
            background: rgba(245, 158, 11, 0.18) !important;
            color: #f59e0b !important;
            border: 1.5px solid rgba(245, 158, 11, 0.4) !important;
        }

        #chat-code-access-btn.access-on svg {
            stroke: #f59e0b;
        }

        /* ── GenA Mode Button ── */
        #gena-mode-btn {
            display: flex;
            position: relative;
            transition: background 0.25s, color 0.25s, box-shadow 0.25s;
        }

        #gena-mode-btn.gena-on {
            background: rgba(139, 92, 246, 0.22) !important;
