<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual">

    <meta name="theme-color" id="theme-color-meta" content="#0a0a0c">
    <meta name="theme-color" content="#0a0a0c" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f0f2f5" media="(prefers-color-scheme: light)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CodX</title>

    <link rel="manifest" id="manifest-link">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ext-searchbox.min.js"></script>
    <script src="https://unpkg.com/jsonrepair/lib/umd/jsonrepair.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

    <style>
        /* ──────────────────────── Variables & Themes ──────────────────────── */

        :root {
            --bg-color: #0a0a0c;
            --editor-bg: #141417;
            --text-color: #e0e0e0;
            --glass-bg: #141419;
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #10b981;
            --accent-dim: rgba(16, 185, 129, 0.15);
            --sidebar-width: 220px;
            --panel-round: 24px;
            --transition: opacity 0.15s;
        }

        body.light-theme {
            --bg-color: #f0f2f5;
            --editor-bg: #ffffff;
            --text-color: #1c1e21;
            --glass-bg: #f8f9fb;
            --glass-border: rgba(0, 0, 0, 0.05);
            --accent: #059669;
            --accent-dim: rgba(5, 150, 105, 0.1);
        }

        /* Anti-Google Search & Global UI Font */


        /* ── PERF: GPU compositing hints for scroll containers ── */
        #editor,
        #preview {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: none;
        }

        .cursor-nav,
        .toolbar-rows,
        .file-tabs-bar,
        .gh-custom-list,
        .agent-provider-grid {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-x: contain;
        }

        /* Touch-action: tells browser which touches to handle natively — zero delay */
        .bottom-area,
        .toolbar-rows,
        .cursor-nav {
            touch-action: pan-x pan-y;
        }

        #editor {
            touch-action: pan-x pan-y pinch-zoom;
        }

        /* Promote scrollable layers to own GPU composite layer */
        .file-tabs-bar {
            transform: translateZ(0);
        }

        /* Prevent text selection flicker during touch */
        .toolbar-btn,
        .icon-btn,
        .tab,
        .file-tab {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* Remove 300ms tap delay on all interactive elements */
        button,
        a,
        [onclick] {
            touch-action: manipulation;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
        }

        .no-select {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body,
        html {
            width: 100vw;
            position: fixed;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100%;
            overscroll-behavior: none;
            -webkit-text-size-adjust: none;
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* ── GPU PERF: Reduce backdrop-filter cost on mobile ── */

        /* ──────────────────────── Header & Tabs ──────────────────────── */

        .app-header {
            flex-shrink: 0;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            padding: 4px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.10);
        }

        /* Tabs pill with snake border animation */
        .tabs {
            display: flex;
            padding: 2px;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
        }

        body.light-theme .tabs {
            background: rgba(0, 0, 0, 0.05);
        }

        /* Snake = thin conic border + inner mask to hollow it out */
        .tabs::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 21px;
            padding: 1px;
            background: conic-gradient(from var(--pill-snake, 0deg),
                    transparent 0deg,
                    transparent 300deg,
                    rgba(16, 185, 129, 0.2) 320deg,
                    rgba(16, 185, 129, 0.7) 340deg,
                    #10b981 352deg,
                    rgba(52, 211, 153, 0.3) 357deg,
                    transparent 360deg);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: pillSnake 3.5s linear infinite;
            pointer-events: none;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        @keyframes pillSnake {
            from {
                --pill-snake: 0deg;
            }

            to {
                --pill-snake: 360deg;
            }
        }

        @property --pill-snake {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        .tab {
            padding: 4px 14px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 12px;
            color: var(--text-color);
            opacity: 0.7;
            transition: opacity 0.15s, transform 0.15s;
            cursor: pointer;
        }

        .tab.active {
            background: var(--accent);
            color: white;
            opacity: 1;
        }

        .main-container {
            flex-grow: 1;
            position: relative;
            background-color: var(--editor-bg);
            overflow: hidden;
        }

        /* FASTEST MONOSPACE FOR EDITOR ONLY */
        #editor {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            font-size: 14px;
            font-family: 'Courier New', Courier, monospace !important;
            z-index: 10;
            contain: size layout;
        }

        /* ──────────────────────── Preview Area ──────────────────────── */
        #preview-area {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            flex-direction: column;
            background: #fdfdfe;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateZ(0);
        }

        body:not(.light-theme) #preview-area {
            background: #0d0d0f;
        }

        #preview-area.active-pane {
            visibility: visible;
            opacity: 1;
        }

        .pv-navbar {
            height: 42px;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 12px;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .pv-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .pv-url {
            background: rgba(0, 0, 0, 0.18);
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 11px;
            color: var(--text-color);
            opacity: 0.8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid var(--glass-border);
            max-width: 240px;
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        
        body.light-theme .pv-url {
            background: rgba(0, 0, 0, 0.04);
        }

        .pv-controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pv-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-color);
            border-radius: 8px;
            cursor: pointer;
            opacity: 0.55;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .pv-btn:active {
            transform: scale(0.9);
        }

        .pv-btn:hover, .pv-btn.active {
            opacity: 1;
            background: var(--accent-dim);
            color: var(--accent);
        }

        .pv-btn .material-icons-round {
            font-size: 18px;
        }

        .pv-spacer {
            width: 1px;
            height: 20px;
            background: var(--glass-border);
            margin: 0 4px;
        }

        .pv-frame-container {
            flex-grow: 1;
            display: flex;
            align-items: flex-start; /* Better for scrolling overflow */
            justify-content: center;
            padding: 24px;
            overflow: auto;
            position: relative;
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.03) 0%, transparent 70%);
            transition: padding 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Centering simulator shell properly without Flexbox centering cut-off bugs */
        #preview {
            margin: auto; /* Handles centering when smaller AND allows scrolling when larger */
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            transition: all 0.45s cubic-bezier(0.34, 1.3, 0.64, 1);
            transform: translateZ(0);
        }

        /* Device Modes */
        .pv-frame-container.mode-phone #preview {
            width: 375px;
            height: 667px;
            border: 10px solid #1a1a1c;
            border-radius: 32px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            flex-shrink: 0; /* Important: prevents shrinking in flex container */
        }

        .pv-frame-container.mode-tablet #preview {
            width: 768px;
            height: 1024px;
            border: 10px solid #1a1a1c;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            max-width: 95%;
            flex-shrink: 0;
        }

        .pv-frame-container.mode-desktop #preview {
            width: 100%;
            height: 100%;
            border-radius: 0;
            border: none;
        }

        .pv-frame-container.mode-desktop {
            padding: 0;
        }

        .ace_mobile-menu,
        .ace_tooltip,
        .ace_callout {
            display: none !important;
            opacity: 0 !important;
            pointer-events: none !important;
            visibility: hidden !important;
        }

        .ace_selection {
            background: rgba(16, 185, 129, 0.35) !important;
        }

        .ace_selected-word {
            background: rgba(16, 185, 129, 0.3) !important;
            border: 1px solid rgba(16, 185, 129, 0.6) !important;
            border-radius: 2px;
        }

        .scroll-jumpers {
            position: absolute;
            right: 10px;
            top: 38%;
            transform: translateY(-50%);
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 35;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .scroll-jumpers.visible {
            opacity: 1;
        }

        .jumper-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            box-shadow: none;
            opacity: 0.5;
            transition: opacity 0.15s, transform 0.15s;
            cursor: pointer;
        }

        .jumper-btn:active {
            transform: scale(0.9);
            opacity: 1;
        }

        /* will-change: transform → own GPU layer, no repaint on slide */


        /* ──────────────────────── Toolbar & Cursor Nav ──────────────────────── */
        .cursor-nav {
            touch-action: pan-x pan-y;
        }

        #editor {
            touch-action: pan-x pan-y pinch-zoom;
        }

            transform: translateZ(0);
        }

        }

        }

        .jumper-btn:active {
            transform: scale(0.9);
            opacity: 1;
        }

        /* Nav panel */
        .bottom-wrapper {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
        }

        .bottom-wrapper.nav-mini #agent-bar {
            display: none;
        }

        /* bottom-area — green border stays always */
        .bottom-area {
            background: var(--glass-bg);
            border-top: 2px solid var(--accent);
            border-radius: var(--panel-round) var(--panel-round) 0 0;
            padding-top: 10px;
            padding-bottom: max(env(safe-area-inset-bottom), 12px);
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.10);
        }

        .drag-handle-area {
            width: 100%;
            height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .drag-pill {
            width: 30px;
            height: 4px;
            background: var(--text-color);
            opacity: 0.25;
            border-radius: 10px;
        }

        /* Nav toggle pill */
        #nav-toggle-btn {
            will-change: transform;
            transition: transform 0.18s ease;
        }

        #nav-toggle-btn:active {
            transform: scale(0.88);
        }

        /* Cursor nav row */
        .cursor-nav {
            display: flex;
            overflow-x: auto;
            padding: 4px 8px 6px 8px;
            gap: 5px;
        }

        .cursor-nav::-webkit-scrollbar {
            display: none;
        }

        .icon-btn {
            background: rgba(128, 128, 128, 0.08);
            border: none;
            border-radius: 10px;
            min-width: 40px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            flex-shrink: 0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .icon-btn:active {
            background: var(--accent-dim);
            color: var(--accent);
            transform: scale(0.9);
        }

        .icon-btn .material-icons-round {
            font-size: 18px;
            pointer-events: none;
        }

        /* ── Toolbar animation ── */
        /* Wrap clips height — separate from animated content to avoid layout recalc */
        .toolbar-rows-wrap {
            overflow: hidden;
            max-height: 220px;
            transition: max-height 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bottom-wrapper.nav-mini .toolbar-rows-wrap {
            max-height: 0;
        }

        /* Content: GPU-only opacity+transform — zero repaint */
        .toolbar-rows {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px 6px 8px 6px;
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.25s ease, transform 0.25s ease;
            will-change: opacity, transform;
        }

        .bottom-wrapper.nav-mini .toolbar-rows {
            opacity: 0;
            transform: translateY(6px);
            pointer-events: none;
        }

        .toolbar-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 2px;
            width: 100%;
        }

        /* Toolbar buttons */
        .toolbar-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: var(--text-color);
            opacity: 0.8;
            font-size: 8px;
            font-weight: 600;
            gap: 1px;
            width: 100%;
            padding: 6px 0;
            cursor: pointer;
            border-radius: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .toolbar-btn .material-icons-round {
            font-size: 19px;
            pointer-events: none;
        }

        .toolbar-btn:active {
            background: var(--accent-dim);
            color: var(--accent);
            opacity: 1;
            transform: scale(0.9);
        }


        /* restore-btn removed */


        /* Shared Modal CSS */
        .modal {
            position: fixed;
            left: 5%;
            width: 90%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--panel-round);
            padding: 15px;
            z-index: 99999;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
            transition: opacity 0.15s, transform 0.15s;
            bottom: -150%;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96);
        }

        .modal.active {
            bottom: 20px;
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* Find modal — redesigned card */
        #find-modal {
            left: 50% !important;
            width: 92%;
            max-width: 420px;
            bottom: auto !important;
            transform: translateX(-50%) translateY(12px) scale(0.96);
            border-radius: 20px;
            padding: 0;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
            transition: opacity 0.22s cubic-bezier(0.4, 0, 0.2, 1), transform 0.28s cubic-bezier(0.34, 1.2, 0.64, 1);
            z-index: 100001 !important;
            /* ← Yeh line add ki */
        }

        #find-modal.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0) scale(1);
            z-index: 100001 !important;
            /* ← Yeh line add ki */
        }

        /* Animated search icon */
        @keyframes fm-scan {
            0% {
                stroke-dashoffset: 62;
                opacity: 0.4;
            }

            50% {
                stroke-dashoffset: 0;
                opacity: 1;
            }

            100% {
                stroke-dashoffset: 62;
                opacity: 0.4;
            }
        }

        @keyframes fm-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.18);
                opacity: 1;
            }
        }

        #fm-scan-circle {
            stroke-dasharray: 62;
            stroke-dashoffset: 62;
        }

        #find-modal.active #fm-scan-circle {
            animation: fm-scan 2s ease-in-out infinite;
        }

        #find-modal.active #fm-lens-dot {
            animation: fm-pulse 2s ease-in-out infinite;
        }

        /* Find/Replace field — monospace, editor-style */
        #find-modal .fm-field {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
            border: 1.5px solid var(--glass-border);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            resize: none;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
            transition: border-color 0.15s, box-shadow 0.15s;
            line-height: 1.55;
        }

        #find-modal .fm-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);
        }

        body.light-theme #find-modal .fm-field {
            background: rgba(0, 0, 0, 0.06);
        }

        /* Toggle chips */
        .fm-chip {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 9px;
            border-radius: 8px;
            border: 1.5px solid var(--glass-border);
            background: transparent;
            color: var(--text-color);
            opacity: 0.6;
            font-family: 'Poppins', sans-serif;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .fm-chip.on {
            border-color: var(--accent);
            background: var(--accent-dim);
            color: var(--accent);
            opacity: 1;
        }

        .modal textarea,
        .modal input,
        .modal select {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
        }

        .modal-btn {
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }

        .modal-btn:active {
            opacity: 0.8;
            transform: scale(0.97);
        }

        .modal-btn.secondary {
            background: rgba(128, 128, 128, 0.2);
            color: var(--text-color);
        }


        /* Find modal checkbox styles */
        .find-options {
            display: flex;
            gap: 12px;
            margin-bottom: 8px;
        }

        .find-check-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-color);
            opacity: 0.8;

        /* GitHub modal — full screen sheet */
        #github-modal {

            left: 50%;

            bottom: auto !important;
            width: 88%;
            max-width: 380px;
            max-height: 82vh;
            overflow-y: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 14px;
            z-index: 110;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);

            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
        }

        #github-modal::-webkit-scrollbar {
            display: none;
        }

        #github-modal.active {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #gh-overlay {
            position: fixed;

            background: rgba(0, 0, 0, 0.55);

            display: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #gh-overlay.active {
            display: block;
            opacity: 1;
        }

        #github-modal {
            pointer-events: none;
            visibility: hidden;
        }

        #github-modal.active {
            pointer-events: auto;
            visibility: visible;
        }

        .gh-select-wrap {
            position: relative;
            margin-bottom: 8px;
        }

        .gh-select-wrap select {
            width: 100%;
            padding: 11px 36px 11px 12px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;

            box-shadow: 0 0 0 2px var(--accent-dim);

        }

        #github-modal input {
            font-family: 'Poppins', sans-serif;
            border-radius: 10px;
            padding: 11px 12px;

        }

        #github-modal input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-dim);

        }

        /* GitHub file tree */
        #gh-file-tree {

            display: none;
        }

        }

        .gh-tree-item.selected {
            background: var(--accent-dim);
        }

        .gh-tree-item .gh-item-icon {
            font-size: 16px;
            color: var(--accent);
            flex-shrink: 0;
        }

        .gh-tree-item .gh-item-name {
            flex: 1;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-color);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .gh-tree-item .gh-item-actions {
            display: flex;
            gap: 4px;
            opacity: 1;
            pointer-events: auto;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }

        .gh-item-action-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: none;

            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .gh-item-action-btn:hover {
            background: var(--accent-dim);
            color: var(--accent);
        }

            background: var(--accent);

        }

            pointer-events: none;
        }

            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;

        }

            font-size: 11px;
            font-weight: 600;
            color: var(--accent);

        }

            font-size: 11px;
            opacity: 0.3;
        }

        .gh-tree-loading {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            opacity: 0.5;
        }


        /* File Tabs Bar */
        .file-tabs-bar {
            flex-shrink: 0;
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            background: var(--glass-bg);
            border-bottom: 1px solid var(--glass-border);
            padding: 0 6px;
            gap: 2px;
        }

        .file-tabs-bar::-webkit-scrollbar {
            display: none;
        }

        /* Prevent editor area going black when keyboard opens */
        body.chat-kb-open #editor-wrapper {
            background: var(--editor-bg) !important;
        }

        body.chat-kb-open #editor {
            background: var(--editor-bg) !important;
        }

        /* ── Preview mode: bottom panels completely locked ── */
        body.in-preview #bottom-outer,
        body.in-preview #bottom-panel {
            transform: translateY(100%) !important;
            pointer-events: none !important;
            visibility: hidden !important;
            transition: none !important;
        }

        body.in-preview #agent-step-panel {
            display: none !important;
        }

        /* Desktop specific: hide sidebar on X-axis and reset app padding */
        @media (min-width: 768px) {
            body.in-preview #bottom-panel {
                transform: translateX(-100%) !important;
            }
            body.in-preview .app-layout {
                padding-left: 0 !important;
            }
        }

        body.in-preview #inline-chat-panel {
            transform: translateY(100%) !important;
            pointer-events: none !important;
            visibility: hidden !important;
            transition: none !important;
        }

        /* Header always visible and on top in preview */
        body.in-preview #header {
            display: flex !important;
            visibility: visible !important;
            opacity: 1 !important;
            z-index: 1000 !important;
            pointer-events: auto !important;
        }

        body.in-preview #editor-wrapper {
            flex-grow: 1 !important;
            height: 100% !important; /* Fixed: using 100% instead of auto to allow children to fill space */
            min-height: 0 !important;
        }

        /* Chat panel open hone par sirf #editor block karo — wrapper nahi
           (inline-chat-panel editor-wrapper ke andar hai) */
        body.chat-is-open #editor {
            pointer-events: none !important;
            touch-action: none !important;
            user-select: none !important;
            -webkit-user-select: none !important;
        }

        /* Chat panel khud aur uske andar sab clickable rahe */
        body.chat-is-open #inline-chat-panel {
            pointer-events: auto !important;
        }

        .file-tab {

            font-size: 11px;
            font-weight: 600;
            color: var(--text-color);
            opacity: 0.55;
            border-bottom: 2px solid transparent;

            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;

        /* ===== WELCOME SCREEN ===== */
        #welcome-screen {

            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;

        }

        #welcome-screen.hidden {

        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.07);

                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

            height: 72px;

            font-size: 28px;
            font-weight: 900;
            color: white;

            box-shadow: none;
            animation: welcomeLogoPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
        }

        @keyframes welcomeLogoPop {
            from {
                opacity: 0;
                transform: scale(0.6);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .welcome-title {
            font-size: 28px;

            margin-bottom: 8px;

            font-size: 13px;

        }

                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-features {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
            animation: welcomeFadeUp 0.5s ease 0.75s both;
        }

            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);

        .welcome-start-btn {

        /* ===== REPO LOAD PROGRESS BAR ===== */
        #repo-progress-overlay {
